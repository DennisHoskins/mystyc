services:
  api:
    container_name: mystyc-api
    env_file: .env
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    container_name: mystyc-db
    image: mongo:latest
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./mongod.conf:/etc/mongo/mongod.conf:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: M0ng01234
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  mongo_data: